$terminal = ghostty
$editor = code
$browser = firefox
$fileManager = dolphin
$menu = hyprlauncher

monitor = , preferred, auto, 1

workspace = 1, defaultName:terminal, monitor:DP-1, default:true, on-created-empty:$terminal, persistent:true
workspace = 2, defaultName:editor, monitor:DP-1, persistent:true
workspace = 3, defaultName:spotify, monitor:DP-1, on-created-empty:spotify, persistent:true
workspace = 4, defaultName:browser, monitor:HDMI-A-1, on-created-empty:$browser, persistent:true

exec-once = uwsm app -- 1password --silent
exec-once = systemctl --user enable --now hyprpaper.service
exec-once = systemctl --user enable --now waybar.service

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = XDG_MENU_PREFIX, arch-
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true

    allow_tearing = false
    layout = dwindle
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

decoration {
    rounding = 8
    rounding_power = 2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = no

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

input {
    kb_layout = us

    repeat_rate = 30
    repeat_delay = 250

    sensitivity = 0
    accel_profile = flat
    follow_mouse = 1
    force_no_accel = 1

    touchpad {
        natural_scroll = false
    }
}

$mainMod = SUPER

bind = $mainMod, return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, W, killactive,
bind = $mainMod, O, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, fullscreen, toggle
bind = $mainMod, P, exec, hyprpicker | wl-copy
bind = $mainMod, escape, exit,

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, H, movecurrentworkspacetomonitor, l
bind = $mainMod SHIFT, L, movecurrentworkspacetomonitor, r

bind = $mainMod, TAB, togglespecialworkspace, magic
bind = $mainMod SHIFT, TAB, movetoworkspace, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/screenshots/$(date +%F_%T).png
bind = $mainMod, S, exec, grim -g "0,0 1920x1080" - | wl-copy && wl-paste > ~/screenshots/$(date +%F_%T).png

# media

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86AudioRaiseVolume, exec, amixer set Master 5%+
bindel = , XF86AudioLowerVolume, exec, amixer set Master 5%-
bindl  = , XF86AudioMute, exec, amixer set Master toggle

windowrule = suppress_event maximize, match:class .*
windowrule = fullscreen on, match:class ^Minecraft\*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

